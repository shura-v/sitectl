server {
    listen 80;
    listen [::]:80;
    server_name __SITE_NAME__;

    root /var/www/__SITE_NAME__;
    index index.html;

    # ACME challenge should stay reachable before certificate issuance.
    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
