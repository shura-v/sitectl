server {
    listen 80;
    listen [::]:80;
    server_name __SITE_NAME__;

    root /var/www/__SITE_NAME__;
    index index.html;

    # ACME challenge should stay reachable before certificate issuance.
    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __SITE_NAME__;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    ssl_certificate     /etc/letsencrypt/live/__SITE_NAME__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__SITE_NAME__/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    location / {
        return 503 "Not ready yet\n";
    }
}
